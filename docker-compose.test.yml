services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-worldcam_app}
      POSTGRES_USER: ${POSTGRES_USER:-worldcam_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worldcam_app}
    volumes:
      - worldcam-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldcam_app} -d ${POSTGRES_DB:-worldcam_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - worldcam-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: 4000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-worldcam_app}:${POSTGRES_PASSWORD:-worldcam_app}@postgres:5432/${POSTGRES_DB:-worldcam_app}
      REDIS_URL: redis://redis:6379
      ODOO_URL: ${ODOO_URL:?ODOO_URL is required}
      ODOO_DB: ${ODOO_DB:?ODOO_DB is required}
      ODOO_USERNAME: ${ODOO_USERNAME:?ODOO_USERNAME is required}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
      ODOO_API_TOKEN: ${ODOO_API_TOKEN:-}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  worldcam-postgres:
  worldcam-redis:
